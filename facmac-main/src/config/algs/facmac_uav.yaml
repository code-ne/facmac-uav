# --- FACMAC specific parameters for UAV Path Planning ---

# --- Action Space (Continuous for UAVs) ---
action_range: # 动作范围，通常归一化为 -1 到 1，具体取决于环境wrapper
  min: -1
  max: 1
action_selector: "gaussian" # 无人机通常使用高斯策略进行连续控制，而非Gumbel
epsilon_start: 0.5 # 高斯噪声的初始衰减参数 (如果使用epsilon decay noise)
epsilon_finish: 0.05
epsilon_anneal_time: 50000

# --- Agent Architecture ---
agent: rnn # 使用RNN以处理部分可观测性 (POMDP)，这对无人机避障至关重要
obs_agent_id: True # 必须包含，以便无人机区分自身与队友
obs_last_action: True # 包含上一步动作，体现无人机的惯性/运动学约束
agent_output_type: "pi_mean" # 连续控制：输出动作分布的均值

# --- Training Hyperparameters ---
batch_size_run: 1
batch_size: 64 # 无人机环境通常状态较简单，适当增大batch size有助于稳定梯度
buffer_size: 10000 # 增大缓存，路径规划任务通常episode较长
buffer_warmup: 500 # 预热步数 （ReplayBuffer 里至少有100个 episode产生的数据后，才允许训练，在 buffer ≥ warmup 之后：几乎“边采样边训练”）
discretize_actions: False # 关键：关闭离散化
double_q: True # 开启Double Q以减少过估计
epsilon_decay_mode: "linear"

# --- Exploration (Continuous) ---
exploration_mode: "gaussian"
start_steps: 1000 # 在真正训练前，先随机探索一段时间收集数据
act_noise: 0.1 # 动作执行时添加的高斯噪声标准差
# ou_theta: 0.15 # Ornstein-Uhlenbeck 噪声参数 (用于模拟惯性探索)
# ou_sigma: 0.2
ou_noise_scale: 0.3
final_ou_noise_scale: 0.0
gamma: 0.99 # 折扣因子，0.99适合长视距的路径规划

# --- Gradient & Optimization ---
grad_norm_clip: 0.5 # 梯度裁剪，防止爆炸
learner: "facmac_learner" # 使用标准的连续动作 FACMAC learner (去掉了_discrete)
learn_interval: 1
lr: 0.0001 # Actor 学习率(0.0003为3e-4)
critic_lr: 0.0001 # Critic 学习率 (通常比Actor大或相等)
td_lambda: 0.8
critic_train_reps: 1
q_nstep: 0

# --- Mixing Network (QMIX structure) ---
mac: "cqmix_mac" # 使用cqmix_mac作为多智能体控制器,处理UAV的连续动作
mixer: "qmix" # 使用QMIX网络进行价值分解
mixing_embed_dim: 64 # 增大混合网络维度以拟合复杂的避障逻辑
skip_connections: False
gated: False
hypernet_layers: 2
hypernet_embed: 64
hyper_initialization_nonzeros: 0

# --- General ---
name: "facmac_uav_navigation"
n_runners: ~
n_train: 1
optimizer: "adam"
ou_stop_episode: 100
rnn_hidden_dim: 64 # 64或128，取决于输入状态维度大小
run_mode: ~
runner: "episode"
runner_scope: 'episodic'
target_update_interval: 200
target_update_mode: 'soft' # 连续控制通常使用 soft update (polyak averaging)
target_update_tau: 0.001 # Soft update 系数,目标网络更新速度
test_greedy: True
test_interval: 1000
test_nepisode: 20
testing_on: True
t_max: 5000000 # 无人机任务收敛通常比SMAC慢，增加总步数
save_model: True # 建议保存模型
save_model_interval: 50000
verbose: False
weight_decay: True
weight_decay_factor: 0.0001

# --- Environment Specifics ---
env_args:
  state_last_action: False
  # 下面是无人机环境常见的参数示例
  map_name: "uav_simple_spread"
  num_agents: 3
  continuous_actions: True

agent_return_logits: False
q_embed_dim: 1
mask_before_softmax: False # 连续动作不需要softmax mask